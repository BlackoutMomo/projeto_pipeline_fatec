# =============================================================================
# PIPELINE CI/CD COM CODEQL - FATEC
# =============================================================================
# Esta pipeline automatiza o processo de integração e entrega contínua (CI/CD)
# para aplicações Python, incluindo análise de segurança com CodeQL.
#
# Fluxo:
# 1. Análise de Segurança (CodeQL)
# 2. Verificação de Vulnerabilidades (BLOQUEIO OBRIGATÓRIO)
# 3. Testes Automatizados
# 4. Deploy para Ambiente de Stage
# =============================================================================

name: CI/CD Pipeline com CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # JOB 1: ANÁLISE DE SEGURANÇA COM CODEQL
  codeql-analysis:
    name: 🔒 Análise de Segurança (CodeQL)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔧 Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql-config.yml
          queries: security-extended,security-and-quality

      - name: 🔍 Análise Automática do Código
        uses: github/codeql-action/autobuild@v4

      - name: 📊 Executar Análise CodeQL
        id: codeql-analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
          upload: true

  # JOB 2: VERIFICAR VULNERABILIDADES (BLOQUEIO OBRIGATÓRIO) ⭐ NOVO
  security-check:
    name: 🚨 Verificação Crítica de Segurança
    runs-on: ubuntu-latest
    needs: codeql-analysis
    
    steps:
      - name: ⏳ Aguardar processamento do CodeQL
        run: |
          echo "⏳ Aguardando processamento dos resultados do CodeQL..."
          sleep 15

      - name: 🚫 Bloquear se houver QUALQUER vulnerabilidade
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Verificando alertas de segurança (CodeQL)..."
          echo "Repository: ${{ github.repository }}"
          echo ""
          
          ALERTS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?state=open")
          
          ALERT_COUNT=$(echo "$ALERTS" | jq 'length')
          
          echo "📊 Total de alertas encontrados: $ALERT_COUNT"
          echo ""
          
          if [ "$ALERT_COUNT" -gt 0 ]; then
            echo "❌ ============================================"
            echo "❌ 🚨 VULNERABILIDADES DETECTADAS!"
            echo "❌ ============================================"
            echo ""
            echo "🔴 PIPELINE BLOQUEADA - NÃO HÁ EXCEÇÕES!"
            echo "Total: $ALERT_COUNT vulnerabilidade(s)"
            echo ""
            echo "📋 Detalhes:"
            echo "$ALERTS" | jq -r '.[] | "  • [\(.rule.severity | ascii_upcase)] \(.rule.description) em \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            echo ""
            echo "🔗 Veja mais em:"
            echo "   https://github.com/${{ github.repository }}/security/code-scanning"
            echo ""
            exit 1
          else
            echo "✅ NENHUMA VULNERABILIDADE ENCONTRADA!"
            echo "Pipeline pode continuar com segurança"
          fi

  # JOB 3: TESTES AUTOMATIZADOS
  tests:
    name: 🧪 Testes Automatizados
    runs-on: ubuntu-latest
    needs: [codeql-analysis, security-check]
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🧪 Executar testes
        run: |
          echo "🧪 Executando testes..."
          python -m pytest tests/ -v --tb=short
          echo "✅ Testes concluídos!"

  # JOB 4: DEPLOY PARA STAGE
  deploy-stage:
    name: 🚀 Deploy para Stage
    runs-on: ubuntu-latest
    needs: [codeql-analysis, security-check, tests]
    
    environment:
      name: stage
      url: https://stage.exemplo.com
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Preparar artefatos
        run: |
          echo "📦 Criando pacote para deploy..."
          pip install -r requirements.txt
          echo "✅ Artefatos preparados!"

      - name: 🚀 Deploy para Stage
        run: |
          echo "🚀 Iniciando deploy para ambiente de STAGE..."
          echo "✅ Deploy realizado com sucesso!"